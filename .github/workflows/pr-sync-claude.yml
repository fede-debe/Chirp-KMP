name: PR Sync & Claude Description

on:
    pull_request:
        branches: [ main ]
        types: [ opened, reopened, closed ]

jobs:
    sync:
        name: Sync PR to Notion
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Sync PR status and generate description
              uses: actions/github-script@v7
              env:
                  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
                  NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
                  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
              with:
                  script: |
                      const branch = context.payload.pull_request.head.ref;
                      const prNumber = context.payload.pull_request.number;
                      const prUrl = context.payload.pull_request.html_url;
                      const isMerged = context.payload.pull_request.merged === true;
                      const action = context.payload.action;

                      // Detect branch type for clearer logging and Claude framing
                      const typeMatch = branch.match(/^(feature|bug|improve)\//);
                      const branchType = typeMatch ? typeMatch[1] : null;
                      const typeLabel = {
                        feature: 'Feature',
                        bug: 'Bug fix',
                        improve: 'Improvement',
                      }[branchType] ?? 'Chore/infra';

                      console.log(`Branch: ${branch} | Type: ${typeLabel}`);

                      const headers = {
                        'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json',
                      };

                      // Only tracked types (feature/bug/improve) have Notion tasks
                      let task = null;
                      if (branchType) {
                        const queryResponse = await fetch(
                          `https://api.notion.com/v1/databases/${process.env.NOTION_TASKS_DB_ID}/query`,
                          {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({
                              filter: {
                                property: 'Branch',
                                rich_text: { equals: branch }
                              }
                            }),
                          }
                        );
                        const queryData = await queryResponse.json();
                        task = queryData.results?.[0] ?? null;
                        if (!task) {
                          console.log(`⚠️ No Notion task found for branch "${branch}" — was it created by notion-task-sync?`);
                        }
                      } else {
                        console.log(`ℹ️ Skipping Notion task sync: "${branch}" is not a tracked type (feature/bug/improve).`);
                      }

                      // Update task status based on PR action
                      if (task) {
                        let newStatus;
                        if (action === 'opened' || action === 'reopened') {
                          newStatus = '👀 In Review';
                        } else if (action === 'closed' && isMerged) {
                          newStatus = '✅ Done';
                        } else if (action === 'closed' && !isMerged) {
                          newStatus = '📦 Archived';
                        }

                        if (newStatus) {
                          await fetch(`https://api.notion.com/v1/pages/${task.id}`, {
                            method: 'PATCH',
                            headers,
                            body: JSON.stringify({
                              properties: {
                                Status: { select: { name: newStatus } },
                                PR: { url: prUrl }
                              }
                            }),
                          });
                          console.log(`✅ Notion task updated: ${newStatus} | PR: ${prUrl}`);
                        }
                      }

                      // Generate Claude PR description only on PR opened/reopened
                      if (action !== 'opened' && action !== 'reopened') return;

                      console.log('Generating PR description with Claude...');

                      const { execSync } = require('child_process');
                      let diffStat = '';
                      let diffContent = '';
                      try {
                        diffStat = execSync('git diff origin/main...HEAD --stat').toString().slice(0, 2000);
                        diffContent = execSync("git diff origin/main...HEAD -- '*.kt' '*.kts' '*.yaml' '*
