name: Notion Task Sync

on:
    push:
        branches:
            - 'feature/**'
            - 'bug/**'
            - 'improve/**'

jobs:
    sync:
        name: Sync Branch to Notion Task
        runs-on: ubuntu-latest

        steps:
            - name: Create or update Notion task
              uses: actions/github-script@v7
              env:
                  NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
                  NOTION_TASKS_DB_ID: ${{ secrets.NOTION_TASKS_DB_ID }}
                  NOTION_FEATURES_DB_ID: ${{ secrets.NOTION_FEATURES_DB_ID }}
              with:
                  script: |
                      const branch = context.ref.replace('refs/heads/', '');

                      // Parse <type>/<feature-slug>--<task-slug>
                      const match = branch.match(/^(feature|bug|improve)\/(.+)--(.+)$/);
                      if (!match) {
                        console.log(`Branch "${branch}" does not follow <type>/<feature>--<task> convention (types: feature|bug|improve). Skipping.`);
                        return;
                      }

                      const typeSlug = match[1];
                      const featureSlug = match[2].toLowerCase();
                      const taskSlug = match[3].toLowerCase();
                      const taskName = taskSlug.replace(/-/g, ' ');
                      const featureName = featureSlug.replace(/-/g, ' ');

                      const typeMap = {
                        feature: 'Feature',
                        bug: 'Bug',
                        improve: 'Improvement',
                      };
                      const typeValue = typeMap[typeSlug];

                      const normalize = (s) => (s ?? '')
                        .toLowerCase()
                        .replace(/[-_]/g, ' ')
                        .replace(/[^a-z0-9 ]/g, '')
                        .replace(/\s+/g, ' ')
                        .trim();

                      console.log(`Type: "${typeValue}" | Feature: "${featureName}" | Task: "${taskName}"`);

                      const headers = {
                        'Authorization': `Bearer ${process.env.NOTION_TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json',
                      };

                      // Check if task already exists for this branch
                      const existingQuery = await fetch(
                        `https://api.notion.com/v1/databases/${process.env.NOTION_TASKS_DB_ID}/query`,
                        {
                          method: 'POST',
                          headers,
                          body: JSON.stringify({
                            filter: {
                              property: 'Branch',
                              rich_text: { equals: branch }
                            }
                          }),
                        }
                      );
                      const existingData = await existingQuery.json();

                      if (existingData.results && existingData.results.length > 0) {
                        console.log(`Task already exists for branch "${branch}", skipping creation.`);
                        return;
                      }

                      // Find matching feature
                      const featuresQuery = await fetch(
                        `https://api.notion.com/v1/databases/${process.env.NOTION_FEATURES_DB_ID}/query`,
                        {
                          method: 'POST',
                          headers,
                          body: JSON.stringify({ page_size: 100 }),
                        }
                      );
                      const featuresData = await featuresQuery.json();

                      const target = normalize(featureName);
                      const feature = featuresData.results?.find(p => {
                        const title = normalize(p.properties.Name?.title?.[0]?.plain_text);
                        return title === target || title.includes(target) || target.includes(title);
                      });

                      if (!feature) {
                        console.log(`❌ No Notion feature found matching "${featureName}"`);
                        console.log(`Available features: ${featuresData.results?.map(p => p.properties.Name?.title?.[0]?.plain_text).join(', ')}`);
                        core.setFailed(`Feature "${featureName}" not found in Notion. Create it first, then re-run.`);
                        return;
                      }

                      console.log(`Found feature: ${feature.properties.Name.title[0].plain_text}`);

                      const platform = branch.includes('mobile') || branch.includes('ui') || branch.includes('compose')
                        ? 'Mobile/Desktop'
                        : 'Backend';

                      const createResponse = await fetch('https://api.notion.com/v1/pages', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({
                          parent: { database_id: process.env.NOTION_TASKS_DB_ID },
                          properties: {
                            Name: {
                              title: [{ text: { content: taskName } }]
                            },
                            Status: {
                              select: { name: '🔨 In Progress' }
                            },
                            Type: {
                              select: { name: typeValue }
                            },
                            Platform: {
                              select: { name: platform }
                            },
                            Branch: {
                              rich_text: [{ text: { content: branch } }]
                            },
                            Features: {
                              relation: [{ id: feature.id }]
                            }
                          }
                        }),
                      });

                      const created = await createResponse.json();
                      if (created.id) {
                        console.log(`✅ Task "${taskName}" [${typeValue}] created, linked to "${feature.properties.Name.title[0].plain_text}"`);
                      } else {
                        console.log('Failed to create task:', JSON.stringify(created));
                        core.setFailed('Notion task creation failed.');
                      }
